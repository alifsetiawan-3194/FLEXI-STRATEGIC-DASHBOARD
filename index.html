<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexi Dashboard 2026 - Kabupaten/Kota (External CSV Mapping)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f7f6; overflow: hidden; }
        .navbar { position: absolute; top: 15px; left: 20px; display: flex; gap: 10px; z-index: 1000; }
        .nav-btn { background: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-weight: bold; font-size: 12px; color: #555; border: 1px solid #ddd; }
        .nav-btn.active { background: #00529c; color: white; border-color: #00529c; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .sidebar { position: absolute; top: 80px; right: 20px; width: 360px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 85vh; overflow-y: auto; }
        .filter-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-box { background: #00529c; padding: 10px; border-radius: 8px; color: white; flex: 1; }
        .filter-select { width: 100%; padding: 6px; border-radius: 5px; border: none; margin-top: 5px; font-weight: bold; color: #333; font-size: 11px; }
        
        .stat-card { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #00529c; }
        .stat-card small { color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 18px; color: #333; margin-top: 2px; }
        
        .chart-container { margin-bottom: 15px; padding: 12px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
        .chart-label { font-size: 11px; font-weight: bold; color: #444; margin-bottom: 8px; display: block; border-left: 3px solid #00529c; padding-left: 8px; }
        
        .reset-btn { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: #e74c3c; color: white; padding: 10px 18px; border: none; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; transition: 0.2s; }
        .reset-btn:hover { background: #c0392b; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #00529c; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .custom-div-icon { background: transparent !important; border: none !important; }
        .custom-pin { width: 12px; height: 12px; border-radius: 50%; background: #00529c; border: 2px solid #fff; box-shadow: 0px 0px 6px rgba(0,0,0,0.5); position: absolute; top: 0; left: 0; cursor: pointer; }
        .pin-label { background: rgba(0, 82, 156, 0.9); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; white-space: nowrap; position: absolute; top: -24px; left: 50%; transform: translateX(-50%); box-shadow: 0 2px 5px rgba(0,0,0,0.3); pointer-events: none; z-index: 99999; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text" style="margin-top:10px; font-weight:bold; color:#00529c;">Memuat Batas Wilayah Kabupaten/Kota...</div>
    </div>

    <div class="navbar">
        <a href="index.html" class="nav-btn active">📈 PERFORMANCE SALES</a>
        <a href="risk.html" class="nav-btn">⚠️ DPK & NPL RISK</a>
    </div>

    <button id="btn-reset" class="reset-btn" onclick="resetToNational()">🔄 KEMBALI KE NASIONAL</button>

    <div class="sidebar">
        <div class="filter-container">
            <div class="filter-box">
                <span style="font-size: 10px; font-weight: bold;">BULAN</span>
                <select id="filter-month" class="filter-select">
                    <option value="all">Semua Bulan</option>
                    <option value="1">Januari</option><option value="2">Februari</option>
                    <option value="3">Maret</option><option value="4">April</option>
                    <option value="5">Mei</option><option value="6">Juni</option>
                </select>
            </div>
            <div class="filter-box">
                <span style="font-size: 10px; font-weight: bold;">CABANG / UKER</span>
                <select id="filter-uker" class="filter-select">
                    <option value="all">Semua Cabang</option>
                </select>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; gap:8px; margin-bottom: 8px;">
            <div class="stat-card" style="flex:1;"><small>Total Sales Volume</small><div id="total-os">Rp 0</div></div>
            <div class="stat-card" style="flex:1; border-left-color: #27ae60;"><small>Total NOA</small><div id="total-noa">0</div></div>
        </div>

        <div class="chart-container">
            <span class="chart-label">Tren Ekspansi Bulanan</span>
            <div style="height: 160px;"><canvas id="trendChart"></canvas></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const geoMapping = {
            "0010": { name: "CB MENARA BRILIAN", lat: -6.220556, lng: 106.818444 },
            "0020": { name: "CB WARUNG JATI", lat: -6.273611, lng: 106.829167 },
            "0025": { name: "CB BEKASI", lat: -6.238472, lng: 106.975417 },
            "0110": { name: "CB BANDUNG", lat: -6.9175, lng: 107.6191 },
            "0140": { name: "CB CIREBON", lat: -6.7320, lng: 108.5523 },
            "0310": { name: "CB SEMARANG", lat: -6.9667, lng: 110.4167 },
            "0320": { name: "CB SOLO", lat: -7.5661, lng: 110.8243 },
            "0330": { name: "CB TEMANGGUNG", lat: -7.3167, lng: 110.1833 },
            "0350": { name: "CB YOGYAKARTA", lat: -7.7956, lng: 110.3695 },
            "0410": { name: "CB SURABAYA", lat: -7.2575, lng: 112.7521 },
            "0411": { name: "CB SIDOARJO", lat: -7.4478, lng: 112.7183 },
            "0420": { name: "CB MALANG", lat: -7.9839, lng: 112.6214 },
            "0430": { name: "CB LAMONGAN", lat: -7.1192, lng: 112.4151 },
            "1110": { name: "CB MEDAN", lat: 3.5952, lng: 98.6722 },
            "1310": { name: "CB PEKANBARU", lat: 0.5071, lng: 101.4478 },
            "1312": { name: "CB LUBUK DALAM", lat: 0.6387, lng: 101.8315 },
            "1313": { name: "CB UJUNG BATU", lat: 0.7077, lng: 100.5284 },
            "1314": { name: "CB AIR MOLEK", lat: -0.4578, lng: 102.2901 },
            "1315": { name: "KK DALU DALU", lat: 1.1074, lng: 100.4116 },
            "1520": { name: "CB PALEMBANG", lat: -2.9761, lng: 104.7754 },
            "1710": { name: "CB LAMPUNG", lat: -5.3971, lng: 105.2668 },
            "3210": { name: "CB MAKASSAR", lat: -5.1476, lng: 119.4327 },
            "4010": { name: "CB DENPASAR", lat: -8.6705, lng: 115.2126 }
        };

        const selectUker = document.getElementById('filter-uker');
        Object.keys(geoMapping).forEach(code => {
            let opt = document.createElement('option');
            opt.value = code;
            opt.innerText = geoMapping[code].name;
            selectUker.appendChild(opt);
        });

        var indonesiaBounds = L.latLngBounds(L.latLng(-11.0, 94.0), L.latLng(6.0, 141.0));
        var map = L.map('map', { center: [-2.5489, 118.0149], zoom: 5, minZoom: 5, maxBounds: indonesiaBounds, maxBoundsViscosity: 1.0 });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);
        
        var choroplethLayer = L.layerGroup().addTo(map); 
        var markersLayer = L.layerGroup().addTo(map);
        
        let trendChart = null;
        let rawSales = [];
        let geojsonData = null; 
        let stateDictionary = {}; // Menampung hasil pembacaan file mapping_state.csv secara dinamis
        let globalTotalSales = 0; 

        function formatRupiah(val) {
            if (!val) return "Rp 0";
            if (val >= 1e12) return "Rp " + (val / 1e12).toFixed(2) + " T";
            if (val >= 1e9) return "Rp " + (val / 1e9).toFixed(2) + " M";
            if (val >= 1e6) return "Rp " + (val / 1e6).toFixed(1) + " Jt";
            return "Rp " + Math.round(val).toLocaleString('id-ID');
        }

        function getColor(v) {
            return v > 100e9 ? '#084594' :
                   v > 50e9  ? '#2171b5' :
                   v > 20e9  ? '#4292c6' :
                   v > 10e9  ? '#6baed6' :
                   v > 5e9   ? '#9ecae1' :
                   v > 0     ? '#c6dbef' : 'rgba(0,0,0,0.03)';
        }

        // MEMBACA FILE CSV MAPPING DARI LUAR SECARA DINAMIS
        async function loadGeoJSONAndData() {
            try {
                document.getElementById('loading-text').innerText = "Memuat Batas Wilayah Kabupaten/Kota & Kamus Data...";
                
                // Ambil Peta Kabupaten Kompresi Tinggi + File mapping_state.csv eksternal kamu
                const [geoRes, validationRes] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/superpikar/indonesia-geojson/master/indonesia-kab.json'),
                    fetch('mapping_state.csv') 
                ]);
                
                geojsonData = await geoRes.json();
                const validationText = await validationRes.text();
                
                // Proses Parsing Otomatis 514 baris file mapping_state.csv kamu ke Memory browser
                const parsedValidation = Papa.parse(validationText, { header: true, skipEmptyLines: true }).data;
                parsedValidation.forEach(row => {
                    if(row.state_code && row.nama_provinsi) { // (Catatan: nama_provinsi di sini menyimpan nama KABUPATEN/KOTA sesuai filemu)
                        stateDictionary[String(row.state_code).trim()] = row.nama_provinsi.toUpperCase().trim();
                    }
                });

                document.getElementById('loading-text').innerText = "Memuat Berkas CSV Pencairan Aktif...";
                
                const res = await fetch('data_pencairan_2026.csv');
                if(!res.ok) throw new Error("Gagal memuat file CSV Pencairan");
                const text = await res.text();
                
                rawSales = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true }).data;
                processData();
            } catch (e) { 
                console.error(e);
                document.getElementById('loading-overlay').innerText = "Gagal memuat resource dashboard. Pastikan file mapping_state.csv dan data_pencairan_2026.csv berada di satu folder dan dijalankan lewat Local Server / Live Server.";
            }
        }

        document.getElementById('filter-month').addEventListener('change', processData);
        document.getElementById('filter-uker').addEventListener('change', function() {
            const code = this.value;
            if(code !== 'all' && geoMapping[code]) {
                map.setView([geoMapping[code].lat, geoMapping[code].lng], 9, { animate: true, duration: 1 });
                document.getElementById('btn-reset').style.display = 'block';
            } else if (code === 'all') {
                resetToNational();
            }
            processData();
        });

        function resetToNational() {
            document.getElementById('filter-uker').value = 'all';
            map.setView([-2.5489, 118.0149], 5);
            document.getElementById('btn-reset').style.display = 'none';
            processData();
        }

        function processData() {
            const m = document.getElementById('filter-month').value;
            const selectedUker = document.getElementById('filter-uker').value;
            
            let totalSales = 0, totalNOA = 0;
            let mTrend = Array(12).fill(0);
            let ukerStats = {};
            let cityStats = {}; 

            globalTotalSales = rawSales.reduce((acc, d) => acc + parseFloat(d.approved_amount || 0), 0);

            rawSales.forEach(d => {
                let tgl = d.tanggal_pencairan || "";
                let month = parseInt(tgl.split('-')[1]);
                if (m !== 'all' && month != m) return;

                let loanId = String(d.loan_account_id || "").trim();
                if (!loanId) return;
                if (loanId.length < 15 && !loanId.startsWith("0")) loanId = loanId.padStart(15, "0");

                let code = loanId.substring(0, 4);
                if (selectedUker !== 'all' && code !== selectedUker) return;

                let amt = parseFloat(d.approved_amount || 0);
                totalSales += amt;
                totalNOA += 1; 
                if(month) mTrend[month-1] += amt;

                if(geoMapping[code]) {
                    if(!ukerStats[code]) ukerStats[code] = { os: 0, noa: 0 };
                    ukerStats[code].os += amt;
                    ukerStats[code].noa += 1;
                }

                let sCode = String(d.state_code || "").trim();
                if(sCode.length === 3) sCode = "0" + sCode; 
                
                // Ambil nama kota dari hasil pembacaan mapping_state.csv eksternal!
                let cityName = stateDictionary[sCode] || "LAINNYA"; 

                if (cityName !== "LAINNYA") {
                    cityStats[cityName] = (cityStats[cityName] || 0) + amt;
                }
            });

            document.getElementById('total-os').innerText = formatRupiah(totalSales);
            document.getElementById('total-noa').innerText = totalNOA.toLocaleString('id-ID');
            document.getElementById('loading-overlay').style.display = 'none';

            renderChoropleth(cityStats);
            renderMapMarkers(ukerStats);
            renderTrend(mTrend);
        }

        function renderChoropleth(cityData) {
            choroplethLayer.clearLayers();
            if(!geojsonData) return;

            L.geoJson(geojsonData, {
                style: function(feature) {
                    let fName = (feature.properties.NAME_2 || feature.properties.KAB_KOT || "").toUpperCase();
                    fName = fName.replace("KABUPATEN ", "").replace("KOTA ", "").trim();

                    // Penyelarasan format penulisan khusus Kota Surakarta (Solo) agar sinkron dengan GeoJSON nasional
                    if(fName === "SOLO") fName = "SURAKARTA";

                    let val = cityData[fName] || 0;
                    return {
                        fillColor: getColor(val),
                        weight: 1, 
                        opacity: 1,
                        color: '#ffffff', 
                        fillOpacity: 0.6
                    };
                }
            }).addTo(choroplethLayer);
        }

        function renderMapMarkers(stats) {
            markersLayer.clearLayers();
            Object.keys(stats).forEach(code => {
                if(geoMapping[code]) {
                    const pinHTML = `
                        <div class='custom-pin'>
                            <span class='pin-label'>${geoMapping[code].name.replace("CB ", "")}</span>
                        </div>`;
                    
                    const pin = L.divIcon({ className: 'custom-div-icon', html: pinHTML, iconSize: [12, 12], iconAnchor: [6, 6] });
                    const marker = L.marker([geoMapping[code].lat, geoMapping[code].lng], {icon: pin}).addTo(markersLayer);
                    
                    let kontribusi = globalTotalSales > 0 ? ((stats[code].os / globalTotalSales) * 100).toFixed(1) : 0;
                    
                    marker.bindPopup(`
                        <div style="font-family:sans-serif; min-width:160px;">
                            <b style="color:#00529c; font-size:13px;">${geoMapping[code].name}</b><br>
                            <hr style="margin:4px 0; border:0; border-top:1px solid #ddd;">
                            <small style="color:#666;">VOLUME SALES:</small><br>
                            <b style="font-size:14px; color:#333;">${formatRupiah(stats[code].os)}</b><br>
                            <small style="color:#27ae60;"><b>Kontribusi: ${kontribusi}%</b> vs Nasional</small><br>
                            <small style="color:#666;">TOTAL NOA:</small> <b>${stats[code].noa} Debitur</b>
                        </div>
                    `);
                    
                    marker.on('click', function() {
                        document.getElementById('filter-uker').value = code;
                        map.setView([geoMapping[code].lat, geoMapping[code].lng], 9, { animate: true, duration: 1 });
                        document.getElementById('btn-reset').style.display = 'block';
                        processData();
                    });
                }
            });
        }

        function renderTrend(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trendChart) trendChart.destroy();
            
            trendChart = new Chart(ctx, {
                type: 'line',
                plugins: [ChartDataLabels],
                data: {
                    labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
                    datasets: [{ 
                        data: data.map(v => v/1e9), 
                        borderColor: '#00529c', 
                        tension: 0.2, 
                        fill: true, 
                        backgroundColor: 'rgba(0,82,156,0.05)',
                        pointBackgroundColor: '#00529c',
                        pointRadius: 4
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    layout: { padding: { left: 18, right: 18, top: 24, bottom: 5 } },
                    plugins: { 
                        legend: { display: false },
                        datalabels: {
                            align: function(context) {
                                const index = context.dataIndex;
                                const value = context.dataset.data[index];
                                const prevValue = index > 0 ? context.dataset.data[index - 1] : null;
                                if (prevValue !== null && (prevValue - value) > 10) return 'bottom';
                                return 'top';
                            },
                            anchor: function(context) {
                                const index = context.dataIndex;
                                const value = context.dataset.data[index];
                                const prevValue = index > 0 ? context.dataset.data[index - 1] : null;
                                if (prevValue !== null && (prevValue - value) > 10) return 'start';
                                return 'end';
                            },
                            offset: 6,
                            color: '#333',
                            font: { size: 10, weight: 'bold' },
                            formatter: function(value) { return value > 0 ? value.toFixed(1) + 'M' : ''; }
                        }
                    }, 
                    scales: { 
                        y: { display: false, grid: { display: false }, suggestedMax: Math.max(...data.map(v => v/1e9)) + 15 },
                        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#666' } }
                    } 
                }
            });
        }

        loadGeoJSONAndData();
    </script>
</body>
</html>
