<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur Dashboard - Performance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            background: #f4f7f6;
            overflow: hidden;
        }
        .navbar {
            position: absolute;
            top: 15px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .nav-btn {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 12px;
            color: #555;
            border: 1px solid #ddd;
        }
        .nav-btn.active {
            background: #00529c;
            color: white;
            border-color: #00529c;
        }
        #map {
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .sidebar {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 360px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
            max-height: 85vh;
            overflow-y: auto;
        }
        .panel-header {
            background: #00529c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .placeholder-box {
            background: #f8f9fa;
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            color: #777;
            margin-bottom: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-btn active">📈 PERFORMANCE SALES</a>
        <a href="risk.html" class="nav-btn">⚠️ DPK & NPL RISK</a>
    </div>

    <div class="sidebar">
        <div class="panel-header">📊 PANEL UTAMA: PERFORMANCE</div>
        
        <div class="placeholder-box">
            <h4>[ Metrik Ringkasan ]</h4>
            <p>Tempat Total Sales & Total NOA</p>
        </div>
        
        <div class="placeholder-box">
            <h4>[ Grafik Tren Bulanan ]</h4>
            <p>Tempat Line Chart Ekspansi Bisnis</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-2.5489, 118.0149], 5);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
            pane: 'shadowPane'
        }).addTo(map);

        // Paksa peta mengatur ulang ukuran agar tidak bug/pecah kotak-kotak
        setTimeout(function(){ map.invalidateSize(); }, 500);
    </script>
</body>
</html>
